<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BRDL Knowledge Base</title>
<style>
  :root{--bg1:#1e3a5f;--bg2:#2d6a9f;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
       font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
       background:linear-gradient(135deg,var(--bg1),var(--bg2));color:#fff;padding:24px}
  .card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);
        border-radius:20px;padding:48px 40px;max-width:560px;width:100%;text-align:center;
        box-shadow:0 20px 60px rgba(0,0,0,.35)}
  h1{font-size:2rem;font-weight:700;letter-spacing:-.5px}
  .sub{opacity:.8;margin-top:8px;font-size:1.05rem}
  .links{display:flex;gap:18px;margin-top:36px;flex-wrap:wrap;justify-content:center}
  .btn{flex:1 1 200px;display:flex;flex-direction:column;gap:4px;align-items:center;
       text-decoration:none;color:#fff;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
       border-radius:14px;padding:24px 20px;font-size:1.25rem;font-weight:600;transition:.18s}
  .btn span{font-size:.85rem;font-weight:400;opacity:.75}
  .btn:hover{background:rgba(255,255,255,.22);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.3)}
  .note{margin-top:30px;font-size:.82rem;opacity:.6;line-height:1.5}
</style>
</head>
<body>
  <main class="card">
    <h1>BRDL Knowledge Base</h1>
    <p class="sub">Self-hosted Wissensdatenbank &amp; Tabellen</p>
    <div class="links">
      <a class="btn" href="http://{{env "SERVER_IP"}}:3002">📘 Docmost<span>Knowledge Base</span></a>
      <a class="btn" href="http://{{env "SERVER_IP"}}:8888">🗃️ Baserow<span>Tabellen / Daten</span></a>
    </div>
    <p class="note">HTTPS mit interner CA — beim ersten Besuch die Zertifikatswarnung einmalig akzeptieren.</p>
    <p class="note"><a href="/admin" style="color:#fff;opacity:.7">🛡️ Admin-Bereich (Nutzer verwalten)</a></p>
  </main>
</body>
</html>
